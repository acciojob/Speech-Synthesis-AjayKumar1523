<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voiceinator 5000</title>

  <style>
    body {
      font-family: sans-serif;
      background: #7bc4b2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .voiceinator {
      background: white;
      width: 500px;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      background: #f4c542;
      padding: 15px;
      margin: -20px -20px 20px -20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin: 10px 0;
    }

    select, input {
      width: 100%;
      margin: 10px 0;
    }

    button {
      width: 48%;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="voiceinator">

  <h1>The Voiceinator 5000</h1>

  <!-- Voice Dropdown -->
  <select id="voices"></select>

  <!-- Rate (FIXED name attribute) -->
  <label>Rate:</label>
  <input type="range" id="rate" name="rate" min="0" max="3" step="0.1" value="1">

  <!-- Pitch (FIXED name attribute) -->
  <label>Pitch:</label>
  <input type="range" id="pitch" name="pitch" min="0" max="2" step="0.1" value="1">

  <!-- Text Area -->
  <textarea id="text">Hello! I love JavaScript 👍</textarea>

  <!-- Buttons -->
  <div class="buttons">
    <button id="stop">Stop!</button>
    <button id="speak">Speak</button>
  </div>

</div>

<script>
  const synth = window.speechSynthesis;

  const textInput = document.getElementById("text");
  const voiceSelect = document.getElementById("voices");
  const rate = document.getElementById("rate");
  const pitch = document.getElementById("pitch");
  const speakBtn = document.getElementById("speak");
  const stopBtn = document.getElementById("stop");

  let voices = [];
  let utterance;

  // Populate voices
  function populateVoices() {
    voices = synth.getVoices();
    voiceSelect.innerHTML = "";

    if (voices.length === 0) {
      const option = document.createElement("option");
      option.textContent = "No voices available";
      voiceSelect.appendChild(option);
      return;
    }

    voices.forEach((voice, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    });
  }

  synth.onvoiceschanged = populateVoices;

  // Speak
  function speak() {
    if (!textInput.value.trim()) {
      alert("Please enter some text");
      return;
    }

    synth.cancel();

    utterance = new SpeechSynthesisUtterance(textInput.value);

    const selectedVoice = voices[voiceSelect.value];
    if (selectedVoice) utterance.voice = selectedVoice;

    utterance.rate = parseFloat(rate.value);
    utterance.pitch = parseFloat(pitch.value);

    synth.speak(utterance);
  }

  // Stop
  function stop() {
    synth.cancel();
  }

  // Events
  speakBtn.addEventListener("click", speak);
  stopBtn.addEventListener("click", stop);

  rate.addEventListener("input", () => {
    if (synth.speaking) speak();
  });

  pitch.addEventListener("input", () => {
    if (synth.speaking) speak();
  });

  voiceSelect.addEventListener("change", () => {
    if (synth.speaking) speak();
  });

  // Initial load
  populateVoices();
</script>

</body>
</html>
